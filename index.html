<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
<header class="app-header">
  <h1 class="fade-in">
    <span class="icon">📝</span> 
    <span class="title-text">To‑Do App</span>
  </h1>
  <p class="tagline fade-in">Stay organized, stay creative!</p>
  <hr class="header-divider fade-in">
</header>


    <main>
      <!-- Input Section -->
      <div class="input-section">
        <input type="text" id="task-input" placeholder="Enter a new task...">
        <button id="add-task-btn">Add Task</button>
      </div>

     <!-- Task List -->
<ul id="task-list">
  <!-- Tasks will appear here -->
</ul>

<!-- Clear All Button -->
<button id="clear-tasks-btn">Clear All Tasks</button>



    </main>

    <footer class="site-footer">
  <div class="footer-content">
    <p>Made with <span class="heart">❤️</span> by <strong>Lily</strong></p>
    <small>&copy; 2026 To‑Do App. All rights reserved.</small>
  </div>
</footer>

  </div>

  <script src="scripts.js"></script>
</body>
</html>
